# Netlify configuration file
# This tells Netlify how to build and deploy your React + Vite application automatically.

[build]
  # The command to compile your React application
  command = "npm run build"
  # The directory containing the static assets to distribute (dist is generated by Vite)
  publish = "dist"

# Redirection rules for Single Page Applications (SPA)
# This routes all URL paths back to index.html so your client-side router/anchor navigation handles them cleanly.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
